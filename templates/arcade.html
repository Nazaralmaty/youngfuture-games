<style>
  :root{--ink:#0b1437;--ink2:#161c47;--violet:#6d4bff;--violet2:#8a6bff;--cyan:#21d4fd;--lime:#9be870;--gold:#ffce4a;--red:#ff4d6d;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:#070b1e;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;display:flex;align-items:center;justify-content:center;color:#fff;overflow:hidden}
  #wrap{position:relative;width:100%;max-width:460px;height:100svh;max-height:920px;overflow:hidden;background:#0a1330;user-select:none;box-shadow:0 0 80px rgba(0,0,0,.6)}
  canvas{position:absolute;inset:0;display:block;width:100%;height:100%;touch-action:none;z-index:1}

  /* ---- HUD ---- */
  #hud{position:absolute;top:0;left:0;right:0;z-index:4;display:none;align-items:center;gap:8px;padding:9px 11px;
       background:linear-gradient(180deg,rgba(7,11,30,.92),rgba(7,11,30,.0))}
  #hud.on{display:flex}
  .pill{display:inline-flex;align-items:center;gap:5px;background:rgba(11,19,48,.7);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:6px 11px;font-size:13px;font-weight:900}

  #muteBtn{background:rgba(11,19,48,.7);border:1px solid rgba(255,255,255,.14);color:#fff;border-radius:10px;width:34px;height:34px;cursor:pointer;font-size:15px}
  #prompt{position:absolute;top:48px;left:0;right:0;z-index:3;display:none;text-align:center;padding:6px 12px;pointer-events:none}
  #prompt.on{display:block}
  #prompt .lbl{font-size:11px;letter-spacing:1.5px;color:#9aa3d0;font-weight:800}
  #prompt .big{font-size:26px;font-weight:900;line-height:1.15;text-shadow:0 3px 16px rgba(109,75,255,.5);margin-top:1px}
  #prompt .big.emoji{font-size:46px}

  /* ---- overlays ---- */
  .screen{position:absolute;inset:0;z-index:5;display:none;flex-direction:column;align-items:center;
          padding:22px 20px;overflow-y:auto;background:rgba(7,11,30,.86);backdrop-filter:blur(5px)}

  .htitle{font-size:25px;font-weight:900;letter-spacing:-.5px;text-align:center;margin:6px 0 2px}
  .htitle em{font-style:normal;color:var(--lime)}
  .hsub{font-size:13px;color:#9aa3d0;text-align:center;margin-bottom:14px;max-width:330px;line-height:1.5}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;width:100%;max-width:380px}
  .gcard{background:linear-gradient(160deg,#15205180,#0d163a);border:1px solid #25306a;border-radius:18px;padding:15px 13px;cursor:pointer;
         transition:transform .12s,border-color .12s,box-shadow .12s;text-align:left;position:relative;overflow:hidden}

  .gcard .nm{font-size:15.5px;font-weight:900;margin-top:7px}
  .gcard .ds{font-size:11.5px;color:#9aa3d0;margin-top:2px;line-height:1.4}
  .gcard .tag{position:absolute;top:9px;right:9px;background:var(--lime);color:var(--ink);font-size:9.5px;font-weight:900;padding:3px 7px;border-radius:999px}

  .btn{border:none;cursor:pointer;font-family:inherit;font-weight:900;color:var(--ink);
       background:linear-gradient(135deg,var(--lime),#d6ff8a);border-radius:14px;box-shadow:0 10px 24px rgba(155,232,112,.3);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}

  .btn.alt{background:linear-gradient(135deg,var(--violet),var(--violet2));color:#fff;box-shadow:0 10px 24px rgba(109,75,255,.35)}
  .btn.wa{background:linear-gradient(135deg,#25d366,#16b85a);color:#04210f;box-shadow:0 12px 26px rgba(37,211,102,.4)}
  .back{position:absolute;top:14px;left:14px;background:rgba(11,19,48,.7);border:1px solid rgba(255,255,255,.16);color:#fff;border-radius:11px;padding:9px 14px;font-size:14px;font-weight:800;cursor:pointer}

  .dwrap{width:100%;max-width:340px;display:flex;flex-direction:column;gap:11px;margin-top:8px}
  .dbtn{border:none;cursor:pointer;font-family:inherit;font-weight:900;border-radius:16px;padding:17px 18px;font-size:17px;color:var(--ink);text-align:left;display:flex;align-items:center;justify-content:space-between}
  .dbtn[data-d=easy]{background:linear-gradient(135deg,var(--lime),#d6ff8a)}
  .dbtn[data-d=medium]{background:linear-gradient(135deg,var(--gold),#ffe08a)}

  .score-big{font-size:46px;font-weight:900;color:var(--gold);margin:2px 0;text-shadow:0 4px 20px rgba(255,206,74,.4)}
  .learned{margin:8px 0 4px;max-width:330px;max-height:24vh;overflow:auto;width:100%;text-align:center}
  .learned .lt{font-size:11px;letter-spacing:1px;color:var(--cyan);font-weight:800;margin-bottom:7px}
  .wchip{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:5px 10px;margin:3px;font-size:12.5px}
  .wchip b{color:var(--lime)}
  .cta{margin-top:12px;background:linear-gradient(135deg,var(--ink2),#28306e);border:1px solid #3a4488;border-radius:16px;padding:15px 16px;max-width:340px;text-align:center}
  .cta b{font-size:14.5px}.cta p{font-size:12.5px;color:#c7cdf0;margin-top:5px;line-height:1.5}
  .row2{display:flex;gap:9px;margin-top:12px}
  .row2 .btn{font-size:14px;padding:12px 18px}

  /* countdown */
  #cd{position:absolute;inset:0;z-index:6;display:none;align-items:center;justify-content:center;background:rgba(7,11,30,.55);font-size:120px;font-weight:900;color:#fff;text-shadow:0 6px 30px rgba(109,75,255,.7)}
  #cd.on{display:flex}
  @keyframes cdpop{0%{transform:scale(.4);opacity:0}40%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:.9}}
  #cd span{animation:cdpop .5s ease}
</style>

<script>
/* =================== SOUND ENGINE (Web Audio, procedural; iOS silent-switch unlock) =================== */
var Sound=(function(){
  var ACtx=window.AudioContext||window.webkitAudioContext;
  var ctx=null,master,musicG,sfxG,noiseBuf=null;
  var enabled=true,playing=false,timer=null,step=0,nextT=0,stepDur=0.22;
  function ensure(){ if(ctx)return; if(!ACtx)return;
    ctx=new ACtx();
    master=ctx.createGain();master.gain.value=0.9;master.connect(ctx.destination);
    musicG=ctx.createGain();musicG.gain.value=0.0001;musicG.connect(master);
    sfxG=ctx.createGain();sfxG.gain.value=0.78;sfxG.connect(master);
    var n=Math.floor(ctx.sampleRate*0.4);noiseBuf=ctx.createBuffer(1,n,ctx.sampleRate);
    var d=noiseBuf.getChannelData(0);for(var i=0;i<n;i++)d[i]=Math.random()*2-1;
  }
  function T(){return ctx?ctx.currentTime:0;}
  function tone(f,t0,dur,type,peak,dest){ if(!ctx)return;
    var o=ctx.createOscillator(),g=ctx.createGain();o.type=type||'square';o.frequency.setValueAtTime(f,t0);
    g.gain.setValueAtTime(0.0001,t0);g.gain.exponentialRampToValueAtTime(peak,t0+0.008);g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g);g.connect(dest||sfxG);o.start(t0);o.stop(t0+dur+0.03);}
  function sweep(f0,f1,t0,dur,type,peak,dest){ if(!ctx)return;
    var o=ctx.createOscillator(),g=ctx.createGain();o.type=type||'square';o.frequency.setValueAtTime(f0,t0);o.frequency.exponentialRampToValueAtTime(f1,t0+dur);
    g.gain.setValueAtTime(0.0001,t0);g.gain.exponentialRampToValueAtTime(peak,t0+0.008);g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g);g.connect(dest||sfxG);o.start(t0);o.stop(t0+dur+0.03);}
  function noise(t0,dur,peak,hp){ if(!ctx)return;
    var s=ctx.createBufferSource();s.buffer=noiseBuf;var f=ctx.createBiquadFilter();f.type='highpass';f.frequency.value=hp||2000;
    var g=ctx.createGain();g.gain.setValueAtTime(peak,t0);g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    s.connect(f);f.connect(g);g.connect(sfxG);s.start(t0);s.stop(t0+dur+0.03);}
  function kick(t0){ if(!ctx)return;var o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';
    o.frequency.setValueAtTime(150,t0);o.frequency.exponentialRampToValueAtTime(48,t0+0.12);
    g.gain.setValueAtTime(0.3,t0);g.gain.exponentialRampToValueAtTime(0.0001,t0+0.14);o.connect(g);g.connect(musicG);o.start(t0);o.stop(t0+0.16);}
  function hat(t0){ if(!ctx)return;var s=ctx.createBufferSource();s.buffer=noiseBuf;var f=ctx.createBiquadFilter();f.type='highpass';f.frequency.value=8000;
    var g=ctx.createGain();g.gain.setValueAtTime(0.05,t0);g.gain.exponentialRampToValueAtTime(0.0001,t0+0.04);s.connect(f);f.connect(g);g.connect(musicG);s.start(t0);s.stop(t0+0.05);}
  var SCALE=[523.25,587.33,659.25,783.99,880.0,1046.5];
  var MEL=[0,2,4,5,4,2,3,1,0,2,3,4,2,1,0,-1];
  var BASS=[130.81,196.0,220.0,174.61];
  function stepPlay(i,t){ var m=MEL[i];if(m>=0)tone(SCALE[m],t,stepDur*0.85,'square',0.10,musicG);
    if(i%4===0){tone(BASS[(i/4)%4],t,stepDur*3.2,'triangle',0.16,musicG);kick(t);} if(i%2===1)hat(t);}
  function sched(){ if(!playing||!ctx)return; while(nextT<ctx.currentTime+0.12){stepPlay(step,nextT);nextT+=stepDur;step=(step+1)%16;} timer=setTimeout(sched,25);}
  function go(fn){ if(!enabled)return;ensure();if(!ctx)return;if(ctx.state==='suspended')ctx.resume();fn(T());}
  var __sEl=null, __SILENT='data:audio/wav;base64,UklGRuQDAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YcADAACAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgIA=';
  function iosUnlock(){ try{ if(navigator.audioSession) navigator.audioSession.type='playback'; }catch(e){} if(!__sEl){ try{ __sEl=document.createElement('audio'); __sEl.setAttribute('playsinline',''); __sEl.loop=true; __sEl.volume=0.02; __sEl.src=__SILENT; }catch(e){} } if(__sEl){ try{ var p=__sEl.play(); if(p&&p.catch)p.catch(function(){}); }catch(e){} } }
  return {
    unlock:function(){ensure();if(ctx&&ctx.state==='suspended')ctx.resume();iosUnlock();},
    startMusic:function(bpm){ensure();if(!ctx)return;if(ctx.state==='suspended')ctx.resume();if(playing)return;
      stepDur=60/(bpm||122)/2;step=0;nextT=ctx.currentTime+0.1;playing=true;
      musicG.gain.cancelScheduledValues(ctx.currentTime);musicG.gain.setValueAtTime(0.0001,ctx.currentTime);
      musicG.gain.exponentialRampToValueAtTime(enabled?0.2:0.0001,ctx.currentTime+0.6);sched();},
    stopMusic:function(){playing=false;if(timer)clearTimeout(timer);if(ctx)try{musicG.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.3);}catch(e){}},
    correct:function(){go(function(t){[659.25,830.6,987.77].forEach(function(f,i){tone(f,t+i*0.045,0.16,'triangle',0.30);});});},
    wrong:function(){go(function(t){sweep(330,120,t,0.26,'sawtooth',0.26);noise(t,0.10,0.10,700);});},
    pop:function(){go(function(t){tone(784,t,0.10,'triangle',0.32);tone(1175,t+0.05,0.12,'triangle',0.26);noise(t,0.03,0.06,6000);});},
    flip:function(){go(function(t){tone(523,t,0.07,'square',0.2);});},
    jump:function(){go(function(t){sweep(280,720,t,0.15,'square',0.24);});},
    combo:function(n){go(function(t){var f=520+Math.min(n,14)*55;tone(f,t,0.10,'square',0.26);tone(f*1.5,t+0.04,0.10,'square',0.2);});},
    level:function(){go(function(t){[523,659,784,1046].forEach(function(f,i){tone(f,t+i*0.07,0.18,'triangle',0.3);});});},
    click:function(){go(function(t){tone(900,t,0.05,'square',0.22);noise(t,0.02,0.05,5000);});},
    over:function(){go(function(t){[660,560,440,330].forEach(function(f,i){tone(f,t+i*0.12,0.2,'triangle',0.26);});});},
    win:function(){go(function(t){[523,659,784,1046,1318].forEach(function(f,i){tone(f,t+i*0.09,0.2,'triangle',0.3);});});},
    setEnabled:function(v){enabled=v;ensure();if(ctx){sfxG.gain.value=v?0.78:0.0;if(playing)try{musicG.gain.exponentialRampToValueAtTime(v?0.2:0.0001,ctx.currentTime+0.1);}catch(e){}}},
    toggle:function(){this.setEnabled(!enabled);return enabled;}
  };
})();

/* =================== СӨЗ БАЗАСЫ — воркфлоу осы массивті ауыстырады (жалғыз var WORDS) =================== */
var WORDS=[
  {en:"apple",kk:"алма",e:"🍎"},{en:"dog",kk:"ит",e:"🐶"},{en:"house",kk:"үй",e:"🏠"},
  {en:"water",kk:"су",e:"💧"},{en:"sun",kk:"күн",e:"☀️"},{en:"car",kk:"көлік",e:"🚗"},
  {en:"book",kk:"кітап",e:"📖"},{en:"cat",kk:"мысық",e:"🐱"},{en:"tree",kk:"ағаш",e:"🌳"},
  {en:"fish",kk:"балық",e:"🐟"},{en:"star",kk:"жұлдыз",e:"⭐"},{en:"milk",kk:"сүт",e:"🥛"},
  {q:"She ___ to school every day",o:["goes","go","going"],a:"goes",kk:"he/she + s"},
  {q:"I ___ playing football now",o:["am","is","do"],a:"am",kk:"Present Continuous"},
  {q:"See you ___ Monday",o:["on","at","in"],a:"on",kk:"күнмен → on"},
  {q:"He ___ like coffee",o:["doesn't","don't","isn't"],a:"doesn't",kk:"he → doesn't"}
];

/* =================== ENGINE =================== */
var Engine=(function(){
  var cv=document.getElementById('cv'), ctx=cv.getContext('2d'), wrap=document.getElementById('wrap');
  var E={ W:0,H:0,DPR:1,ctx:ctx, score:0,combo:0,comboMax:0,lives:3, learned:[], running:false,
          parts:[], pops:[], flash:0, shake:0, WORDS:WORDS, PICW:[], game:null, diffKey:'medium' };
  E.PICW=WORDS.filter(function(w){return w&&w.e;});
  var TTS=('speechSynthesis' in window);
  E.speak=function(t){ if(!TTS||!t)return; try{speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.9;speechSynthesis.speak(u);}catch(e){} };

  function resize(){ var r=wrap.getBoundingClientRect(); E.W=r.width; E.H=r.height;
    E.DPR=Math.min(2,window.devicePixelRatio||1); cv.width=E.W*E.DPR; cv.height=E.H*E.DPR; ctx.setTransform(E.DPR,0,0,E.DPR,0,0);
    if(E.game&&E.game.resize)try{E.game.resize();}catch(e){} }
  window.addEventListener('resize',resize); E.resize=resize;

  E.shuffle=function(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;};
  E.rndItem=function(){ return WORDS.length?WORDS[Math.floor(Math.random()*WORDS.length)]:{en:'?',kk:'?',e:''}; };
  // robust question builder: works for vocab {en,kk,e} and grammar {q,o,a,kk}; degrades without emoji
  E.buildQuestion=function(item,n){
    var promptText='',promptEmoji='',correct='',learn='',opts=[];
    if(item && item.en){
      correct=item.en; promptEmoji=item.e||''; promptText=promptEmoji?'':(item.kk||item.en);
      learn=item.en+(item.kk?(' — '+item.kk):'');
      var pool=WORDS.filter(function(w){return w&&w.en&&w.en!==item.en;}); E.shuffle(pool);

    } else if(item && item.q){

  E.burst=function(x,y,col,n){ for(var i=0;i<n;i++){var a=Math.random()*6.283,sp=Math.random()*E.H*0.3+E.H*0.06;E.parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-E.H*0.1,life:0.6,col:col});} };

  function updateFX(dt){

  }

  var last=0;
  function loop(now){ var dt=Math.min(0.05,(now-(last||now))/1000); last=now;

      ctx.setTransform(E.DPR,0,0,E.DPR,0,0); ctx.clearRect(0,0,E.W,E.H);

  E.startGame=function(def,diffKey){

      moles=[]; for(var i=0;i<n;i++)moles.push({hole:idx[i],label:q.options[i],correct:(q.options[i]===q.correct),up:0,gone:false,col:COL[idx[i]%COL.length]});
      waveT=D.life; gapT=0; }
    return { diffKey:'',diff:null,
      resize:function(){ W=E.W;H=E.H;geom(); },
      start:function(d){ D=d; this.resize(); wave(); },
      down:function(x,y){ for(var i=0;i<moles.length;i++){ var m=moles[i]; if(m.gone||m.up<0.4)continue; var h=holes[m.hole];
          if(Math.abs(x-h.x)<=mw*0.55 && Math.abs(y-h.y)<=mh*0.7){
            if(m.correct){ E.correct(cur.learn,h.x,h.y); E.speak(cur.learn.split(' ')[0]); E.pop('+1',h.x,h.y-mh,'#9be870'); E.burst(h.x,h.y,m.col,12); gapT=0.25; setNext(); } else { m.gone=true; E.wrong(h.x,h.y); } return; } } },
      update:function(dt){ if(gapT>0){ gapT-=dt; if(gapT<=0&&E.running)wave(); return; }
        for(var i=0;i<moles.length;i++){ var m=moles[i]; if(m.gone){ m.up=Math.max(0,m.up-dt*5); continue; } m.up=Math.min(1,m.up+dt*5); }
        waveT-=dt; if(waveT<=0){ var hitCorrect=false; for(var k=0;k<moles.length;k++)if(moles[k].correct&&moles[k].gone)hitCorrect=true; if(!hitCorrect)E.wrong(W/2,H*0.6); gapT=0.25; setNext(); }
      },
      draw:function(ctx){
        for(var i=0;i<holes.length;i++){ var h=holes[i];

        for(var j=0;j<moles.length;j++){ var m=moles[j]; if(m.up<=0.02)continue; var h=holes[m.hole];
          var sc=Math.min(1,m.up); ctx.globalAlpha=Math.min(1,m.up*1.4);

          ctx.fillStyle='rgba(255,255,255,.16)'; rr(ctx,h.x-bw/2,cy-bh/2,bw,bh*0.42,bh*0.30); ctx.fill();
          // label — авто-сыйғызу (қыспай, кеспей)
          ctx.fillStyle='#0b1330'; ctx.textAlign='center'; ctx.textBaseline='middle';
          var fs=Math.round(bh*0.36); ctx.font='800 '+fs+'px Inter,Arial';
          while(fs>9 && ctx.measureText(m.label).width>bw*0.9){ fs--; ctx.font='800 '+fs+'px Inter,Arial'; }
          ctx.fillText(m.label,h.x,cy);
          ctx.globalAlpha=1;
        }
      }
    };
    function setNext(){ /* handled by gapT->wave */ }
  }
};

/* ---- 5. BUBBLE POP (Көпіршік) — NEW ---- */
var BubbleGame={ id:'bubble', name:'Көпіршік', emoji:'🫧', desc:'Дұрыс жауап жазылған көпіршікті жар', bpm:118, neww:true,
  how:'Жоғарыда — мақсат. Көпіршіктер көтеріледі — ДҰРЫС жауап жазылғанын басып ЖАР. Дұрысы қашып кетсе — жан кетеді.',
  diffs:{ easy:{n:3,vy:0.16,r:0.085}, medium:{n:4,vy:0.21,r:0.078}, hard:{n:5,vy:0.27,r:0.072} },
  mk:function(E){
    var W,H,bubbles,cur,D,gap=0;
    var COL=['#21d4fd','#9be870','#ffce4a','#ff6fae','#a06bff','#ff9f43'];
    function wave(){ var q=E.buildQuestion(E.rndItem(),D.n); cur=q;
      E.setPrompt(q.promptEmoji||q.promptText, !!q.promptEmoji);
      bubbles=[]; var n=q.options.length, slot=(W*0.84)/Math.max(1,n);
      var order=E.shuffle(q.options.slice());
      for(var i=0;i<n;i++){ var label=order[i]; var px=W*0.08+slot*(i+0.5);
        bubbles.push({x:px,bx:px,y:H*1.05+i*H*0.10,r:D.r*H,label:label,correct:(label===q.correct),ph:Math.random()*6.28,col:COL[i%COL.length],dead:false}); }
      gap=0; }
    return { diffKey:'',diff:null,
      resize:function(){ W=E.W;H=E.H; },
      start:function(d){ D=d; this.resize(); wave(); },
      down:function(x,y){ for(var i=0;i<bubbles.length;i++){ var b=bubbles[i]; if(b.dead)continue;
          if(Math.hypot(x-b.x,y-b.y)<=b.r*1.08){ if(b.correct){ b.dead=true; Sound.pop(); E.correct(cur.learn,b.x,b.y); E.speak(cur.learn.split(' ')[0]); E.burst(b.x,b.y,b.col,16); E.pop('+1',b.x,b.y-H*0.03,'#9be870'); gap=0.3; bubbles=[]; } else { b.dead=true; Sound.pop(); E.burst(b.x,b.y,'#ff4d6d',10); E.wrong(b.x,b.y); } return; } } },
      update:function(dt){ if(gap>0){ gap-=dt; if(gap<=0&&E.running)wave(); return; }

        for(var i=0;i<bubbles.length;i++){ var b=bubbles[i]; if(b.dead)continue; b.ph+=dt*2; b.y-=D.vy*H*dt; b.x=b.bx+Math.sin(b.ph)*W*0.03;
          if(b.correct)anyCorrect=true;
          if(b.y+b.r<H*0.16){ if(b.correct){ escaped=true; } b.dead=true; } }
        if(escaped){ E.wrong(W/2,H*0.3); bubbles=[]; gap=0.3; }
        else { var live=bubbles.filter(function(x){return !x.dead;}); if(live.length===0||(!anyCorrect&&bubbles.length)){ bubbles=[]; gap=0.3; } }
      },
      draw:function(ctx){ for(var i=0;i<bubbles.length;i++){ var b=bubbles[i]; if(b.dead)continue;
          ctx.fillStyle='rgba(255,255,255,.07)'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill();
          ctx.strokeStyle=b.col; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.stroke();
          ctx.fillStyle='rgba(255,255,255,.5)'; ctx.beginPath(); ctx.arc(b.x-b.r*0.32,b.y-b.r*0.32,b.r*0.18,0,7); ctx.fill();
          ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='800 '+Math.round(b.r*0.46)+'px Inter,Arial';
          var lbl=b.label.length>9?b.label.slice(0,8)+'…':b.label; ctx.fillText(lbl,b.x,b.y);
        }
      }

  }
};

/* ---- 6. MEMORY MATCH (Жұп Тап) — NEW ---- */
var MemoryGame={ id:'memory', name:'Жұп Тап', emoji:'🧠', desc:'Ағылшын мен қазақша жұбын тап', bpm:108, neww:true,
  how:'Карталарды аш: бірі — ағылшынша, екіншісі — қазақша. ЖҰБЫН тап. Бәрін тапсаң — жеңіс!',
  diffs:{ easy:{pairs:3,cols:2}, medium:{pairs:6,cols:3}, hard:{pairs:8,cols:4} },
  mk:function(E){
    var W,H,cards,cols,rows,cw,ch,gap,ox,oy,flipped,lock,matched,moves,D;
    function layout(){ var top=H*0.12; gap=W*0.03; var avail=W*0.92;
      cw=(avail-gap*(cols-1))/cols; ch=cw*1.18; var totalH=rows*ch+gap*(rows-1);
      ox=(W-(cw*cols+gap*(cols-1)))/2; oy=top+Math.max(0,((H-top-H*0.04)-totalH)/2);
      for(var i=0;i<cards.length;i++){ var c=cards[i]; var r=Math.floor(i/cols), cc=i%cols;
        c.x=ox+cc*(cw+gap); c.y=oy+r*(ch+gap); } }
    return { diffKey:'',diff:null,
      resize:function(){ W=E.W;H=E.H; if(cards)layout(); },
      start:function(d){ D=d; W=E.W;H=E.H;
        var vocab=WORDS.filter(function(w){return w&&w.en&&w.kk;});
        E.shuffle(vocab); var np=Math.min(D.pairs, vocab.length); if(np<2){ np=Math.min(2,vocab.length); }
        cards=[]; for(var i=0;i<np;i++){ cards.push({pid:i,face:vocab[i].en,en:true,flip:0,matched:false});
                                          cards.push({pid:i,face:vocab[i].kk,en:false,flip:0,matched:false}); }
        E.shuffle(cards); cols=D.cols; rows=Math.ceil(cards.length/cols); layout();
        flipped=[]; lock=0; matched=0; moves=0; E.setPrompt(null);
      },
      down:function(x,y){ if(lock>0)return;
        for(var i=0;i<cards.length;i++){ var c=cards[i]; if(c.matched||c.flip>0.5)continue;
          if(x>=c.x&&x<=c.x+cw&&y>=c.y&&y<=c.y+ch){ c.flip=1; flipped.push(c); Sound.flip();
            if(flipped.length===2){ moves++; lock=0.65;
              if(flipped[0].pid===flipped[1].pid){ flipped[0].matched=true; flipped[1].matched=true; matched++;
                var en=flipped[0].en?flipped[0].face:flipped[1].face; var kk=flipped[0].en?flipped[1].face:flipped[0].face;
                E.correct(en+' — '+kk, c.x+cw/2, c.y+ch/2); E.speak(en);
                flipped=[]; lock=0.15; if(matched>=cards.length/2){ setTimeout(function(){E.win();},350); } }
            }
            return; } } },
      update:function(dt){ if(lock>0){ lock-=dt; if(lock<=0&&flipped.length===2){ flipped[0].flip=0; flipped[1].flip=0; flipped=[]; } } },
      draw:function(ctx){
        if(!cards||cards.length<2){ ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='800 '+Math.round(H*0.028)+'px Inter,Arial'; ctx.fillText('Бұл ойын үшін сөздер керек 🙂', W/2, H*0.48); return; }
        for(var i=0;i<cards.length;i++){ var c=cards[i]; var show=c.flip>0.5||c.matched;
          ctx.save();
          if(c.matched)ctx.globalAlpha=0.55;
          if(show){ ctx.fillStyle=c.en?'#6d4bff':'#161c47'; rr(ctx,c.x,c.y,cw,ch,12); ctx.fill();
            ctx.strokeStyle=c.matched?'#9be870':'rgba(255,255,255,.25)'; ctx.lineWidth=2; rr(ctx,c.x,c.y,cw,ch,12); ctx.stroke();
            ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
            var fs=Math.min(cw*0.26, ch*0.22); ctx.font='800 '+Math.round(fs)+'px Inter,Arial';
            wrapText(ctx,c.face,c.x+cw/2,c.y+ch/2,cw*0.86,fs*1.1);
          } else { ctx.fillStyle='#0e1738'; rr(ctx,c.x,c.y,cw,ch,12); ctx.fill();
            ctx.strokeStyle='rgba(255,255,255,.14)'; ctx.lineWidth=2; rr(ctx,c.x,c.y,cw,ch,12); ctx.stroke();
            ctx.fillStyle='rgba(255,255,255,.35)'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font=Math.round(ch*0.34)+'px serif'; ctx.fillText('?',c.x+cw/2,c.y+ch/2);
          }
          ctx.restore();
        }
      }
    };
    function wrapText(ctx,text,cx,cy,maxw,lh){ var words=String(text).split(' '),line='',lines=[];
      for(var i=0;i<words.length;i++){ var test=line?line+' '+words[i]:words[i]; if(ctx.measureText(test).width>maxw&&line){lines.push(line);line=words[i];}else line=test; }
      if(line)lines.push(line); var y=cy-(lines.length-1)*lh/2; for(var k=0;k<lines.length;k++)ctx.fillText(lines[k],cx,y+k*lh); }
  }
};

/* ---- 7. FLAPPY (Flappy) — дұрыс саңылаудан ұш ---- */
var FlappyGame={ id:'flappy', name:'Flappy', emoji:'🐤', desc:'Дұрыс саңылаудан ұшып өт', bpm:128,
  how:'Экранды басып құсты ұшыр. Қабырғада 2 саңылау — ДҰРЫС жауап жазылған саңылаудан ұшып өт.',
  diffs:{ easy:{spd:0.32,grav:2.3,flap:0.60,gap:0.20}, medium:{spd:0.44,grav:2.8,flap:0.64,gap:0.17}, hard:{spd:0.58,grav:3.3,flap:0.68,gap:0.15} },
  mk:function(E){
    var W,H,birdX,birdY,vy,wall,D,highC,lowC,gapH,run=0;
    function ask(){ var q=E.buildQuestion(E.rndItem(),2); var top=Math.random()<0.5;
      E.setPrompt(q.promptEmoji||q.promptText,!!q.promptEmoji);
      var corr=q.correct, wr=q.options.filter(function(o){return o!==corr;})[0]||'—';
      wall={x:W*1.14, highL:top?corr:wr, lowL:top?wr:corr, correctHigh:top, learn:q.learn, done:false}; }
    return { diffKey:'',diff:null,
      resize:function(){ W=E.W;H=E.H; birdX=W*0.28; highC=H*0.33; lowC=H*0.70; gapH=(D?D.gap:0.17)*H; if(birdY==null)birdY=H*0.5; },
      start:function(d){ D=d; this.resize(); birdY=H*0.5; vy=0; ask(); },
      down:function(){ vy=-D.flap*H; Sound.jump(); },
      key:function(c){ if(c==='Space'||c==='ArrowUp')this.down(); },
      update:function(dt){ run+=dt; vy+=D.grav*H*dt; birdY+=vy*dt;
        if(birdY<H*0.14){birdY=H*0.14;vy=0;} if(birdY>H*0.97){birdY=H*0.97;vy=0;}
        if(!wall)return; wall.x-=D.spd*W*dt;
        if(!wall.done && wall.x<=birdX){ wall.done=true;
          var inHigh=Math.abs(birdY-highC)<=gapH/2, inLow=Math.abs(birdY-lowC)<=gapH/2;
          var ok=false; if(inHigh)ok=wall.correctHigh; else if(inLow)ok=!wall.correctHigh;
          if(ok){ E.correct(wall.learn,birdX,birdY); E.speak(wall.learn.split(' ')[0]); E.pop('+1',birdX,birdY-H*0.04,'#9be870'); }
          else { E.wrong(birdX,birdY); }
        }
        if(wall.x<-W*0.2){ if(E.running)ask(); }
      },
      draw:function(ctx){
        if(wall){ var pw=W*0.26, x=wall.x, top=H*0.12, gnd=H*0.99;
          var hT=highC-gapH/2, hB=highC+gapH/2, lT=lowC-gapH/2, lB=lowC+gapH/2;
          ctx.fillStyle='#2e7d32'; seg(ctx,x,pw,top,hT); seg(ctx,x,pw,hB,lT); seg(ctx,x,pw,lB,gnd);
          gapLbl(ctx,x,highC,pw,wall.highL); gapLbl(ctx,x,lowC,pw,wall.lowL);
        }
        var s=H*0.038, tilt=Math.max(-0.5,Math.min(0.9,vy/(H*1.2)));
        ctx.save(); ctx.translate(birdX,birdY); ctx.rotate(tilt);
        ctx.fillStyle='#ffce4a'; ctx.beginPath(); ctx.arc(0,0,s,0,7); ctx.fill();
        ctx.fillStyle='#ff9f43'; rr(ctx,-s*0.2,s*0.1,s*0.7,s*0.5,3); ctx.fill();
        ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s*0.35,-s*0.25,s*0.32,0,7); ctx.fill();
        ctx.fillStyle='#0b1330'; ctx.beginPath(); ctx.arc(s*0.45,-s*0.25,s*0.14,0,7); ctx.fill();
        ctx.fillStyle='#ff6b6b'; rr(ctx,s*0.7,-s*0.06,s*0.5,s*0.2,2); ctx.fill();
        ctx.restore();
      }
    };
    function seg(ctx,x,pw,y0,y1){ if(y1<=y0)return; ctx.fillStyle='#2e7d32'; rr(ctx,x-pw/2,y0,pw,y1-y0,8); ctx.fill();
      ctx.fillStyle='#256528'; rr(ctx,x-pw/2,y1-9,pw,9,4); ctx.fill(); }
    function gapLbl(ctx,x,y,pw,label){ var fs=Math.round(pw*0.22); ctx.font='800 '+fs+'px Inter,Arial';
      while(fs>10 && ctx.measureText(label).width>pw*1.6){ fs--; ctx.font='800 '+fs+'px Inter,Arial'; }
      var w=ctx.measureText(label).width+18; ctx.fillStyle='#eafff0'; rr(ctx,x-w/2,y-fs*0.85,w,fs*1.7,7); ctx.fill();
      ctx.fillStyle='#0b1330'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(label,x,y); }
  }
};
